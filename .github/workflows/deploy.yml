name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      PUBLIC_TETACOM_CONTACT_ENDPOINT: ${{ vars.PUBLIC_TETACOM_CONTACT_ENDPOINT }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate public environment
        run: |
          test -n "$PUBLIC_TETACOM_CONTACT_ENDPOINT" || (echo "PUBLIC_TETACOM_CONTACT_ENDPOINT is not set" && exit 1)
          test -n "$PUBLIC_TURNSTILE_SITE_KEY" || (echo "PUBLIC_TURNSTILE_SITE_KEY is not set" && exit 1)

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
