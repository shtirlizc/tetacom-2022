<div class="_modal js-modal" data-modal="modal-feedback">
  <div class="_modal__bg"></div>
  <div class="_modal__wrap">
    <div class="_feedback">
      <div class="_feedback__form">
        <form action="" class="_form js-form">
          <div class="_form__group">
            <div class="_input">
              <input
                type="text"
                name="name"
                id="modal-name"
                placeholder=" "
                required
              />
              <label for="modal-name">Имя</label>
              <span class="_input__border"></span>
            </div>
          </div>
          <div class="_form__group">
            <div class="_input">
              <input
                class="js-phone-mask"
                type="tel"
                name="phone"
                id="modal-phone"
                placeholder=" "
                required
              />
              <label for="modal-phone">Телефон</label>
              <span class="_input__border"></span>
            </div>
          </div>
          <div class="_form__group">
            <div class="_input">
              <input
                type="email"
                name="email"
                id="modal-email"
                placeholder=" "
                required
              />
              <label for="modal-email">E-mail</label>
              <span class="_input__border"></span>
            </div>
          </div>
          <div class="_form__group _form__group--bottom-large">
            <div class="_input">
              <textarea
                name="message"
                id="modal-message"
                placeholder=" "
                required
              ></textarea>
              <label for="modal-message">Комментарий</label>
              <span class="_input__border"></span>
            </div>
          </div>
          <div class="_form__group _form__group--bottom-large">
            <button type="submit" class="_btn _btn--block">
              Оставить заявку
            </button>
          </div>
          <div class="_form__group">
            <p class="_form__rules">
              Заполняя форму, вы соглашаетесь на
              <a href="#">обработку персональных данных</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
