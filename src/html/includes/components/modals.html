<div class="_modal js-modal" data-modal="modal-feedback">
  <div class="_modal__bg"></div>
  <div class="_modal__wrap">
    <div class="_feedback">
      <div class="_feedback__form">
        <form action="" class="_form js-form">
          <div class="_form__group">
            <div class="_input">
              <input
                type="text"
                name="name"
                id="name"
                placeholder=" "
                required
              />
              <label for="name">
                Ваше имя&nbsp;<span class="_required">*</span>
              </label>
            </div>
          </div>
          <div class="_form__group">
            <div class="_input">
              <input
                type="email"
                name="name"
                id="phone"
                placeholder=" "
                required
              />
              <label for="phone"
                >Почта&nbsp;<span class="_required">*</span></label
              >
            </div>
          </div>
          <div class="_form__group">
            <div class="_input">
              <textarea
                name="message"
                id="message"
                placeholder=" "
                required
              ></textarea>
              <label for="message">Ваш комментарий</label>
            </div>
          </div>
          <div class="_form__group">
            <div class="_checkbox">
              <input type="checkbox" name="policy" id="policy" required />
              <label for="policy">
                Я согласен на обработку персональных данных и соглашаюсь с
                <a href="">политикой конфиденциальности</a>
                <span class="_required">*</span>
              </label>
            </div>
          </div>
          <div class="_form__group">
            <button class="_btn _btn--light-bg">Отправить</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
